# Managed by the vicinae.service systemd --user unit instead of exec-once,
# so it can be enabled/disabled the same way as Walker's elephant.service.
# exec-once = vicinae server

# blur
layerrule = blur on, match:namespace vicinae
layerrule = ignore_alpha 0, match:namespace vicinae

# disable fade animation for vicinae only
layerrule = no_anim on, match:namespace vicinae
