[mcp_servers.context7]
args = [
    "-y",
    "@upstash/context7-mcp",
    "--api-key",
    "YOUR_API_KEY",
]
command = "npx"

[mcp_servers.railway]
args = ["mcp"]
command = "railway"

[projects."/home/sebas"]
